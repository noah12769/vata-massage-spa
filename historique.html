<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Historique — Vata Promotions</title>
  <link rel="icon" type="image/png" href="image/favicon.png" />
  <link rel="apple-touch-icon" href="image/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:    #3a9a78; --teal: #1e5a40; --danger: #c94040;
      --text:  rgba(0,0,0,.78); --muted: rgba(0,0,0,.42);
    }
    html, body { min-height: 100dvh; font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2.4rem; background: #1e5a40;
      border-bottom: 1px solid rgba(255,255,255,.12);
      position: sticky; top: 0; z-index: 50;
    }
    .topbar__logo { display: flex; align-items: center; gap: 1rem; }
    .topbar__logo-img { height: 36px; width: auto; }
    .topbar__title { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 1.1rem; font-weight: 300; color: #fff; }
    .topbar__title small { display: block; font-size: .58rem; letter-spacing: .22em; text-transform: uppercase; color: rgba(255,255,255,.55); margin-bottom: .12rem; }

    .btn-back {
      display: inline-flex; align-items: center; gap: .5rem;
      padding: .5rem 1.1rem; border-radius: 100px;
      border: none; background: rgba(255,255,255,.15);
      color: #fff; font-size: .7rem; letter-spacing: .12em;
      text-transform: uppercase; text-decoration: none; transition: background .2s;
    }
    .btn-back:hover { background: rgba(255,255,255,.25); }

    .main { max-width: 1100px; margin: 0 auto; padding: 2.5rem 2rem 5rem; }

    .page-header { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: .6rem; margin-bottom: 1.8rem; }
    .page-header h2 { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 1.6rem; font-weight: 300; color: #fff; }
    .page-header h2 span { font-style: italic; }
    .flyer-count { font-size: .65rem; letter-spacing: .18em; text-transform: uppercase; color: rgba(255,255,255,.6); }

    .history-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(195px, 1fr)); gap: 1.1rem; }

    .h-card { background: #fff; border: 1px solid rgba(0,0,0,.1); border-radius: 14px; overflow: hidden; display: flex; flex-direction: column; transition: border-color .25s; }
    .h-card:hover { border-color: rgba(0,0,0,.2); }

    .h-thumb { width: 100%; aspect-ratio: 2/3; overflow: hidden; flex-shrink: 0; background: var(--bg); }
    .h-thumb-inner { width: 100%; height: 100%; background-size: cover; background-position: center; }

    .h-body { padding: .85rem 1rem; display: flex; flex-direction: column; gap: .28rem; flex: 1; }
    .h-title { font-size: .85rem; font-weight: 400; color: #1a1a1a; line-height: 1.3; }
    .h-dates { font-size: .58rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }

    .h-badge { display: inline-block; margin-top: .3rem; font-size: .5rem; letter-spacing: .16em; text-transform: uppercase; padding: .2rem .55rem; border-radius: 100px; font-weight: 500; }
    .h-badge-active   { background: rgba(45,107,104,.75); color: #fff; }
    .h-badge-upcoming { background: rgba(184,145,60,.85);  color: #fff; }
    .h-badge-expired  { background: rgba(50,50,50,.85);   color: rgba(255,255,255,.45); }

    .empty-state { padding: 4rem; text-align: center; color: rgba(255,255,255,.7); font-size: .9rem; font-style: italic; }

    @media (max-width: 640px) {
      .topbar { padding: .8rem 1.2rem; }
      .main   { padding: 1.5rem 1rem 4rem; }
      .history-grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); }
    }
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar__logo">
    <img src="image/logo.png" alt="Vata" class="topbar__logo-img" />
    <div class="topbar__title">
      <small>Admin</small>
      Historique complet
    </div>
  </div>
  <a href="dashboard.html" class="btn-back">← Tableau de bord</a>
</header>

<main class="main" id="mainContent"></main>

<script src="flyers.js"></script>
<script>
  if (!sessionStorage.getItem('vata_admin')) {
    window.location.href = 'admin.html';
  }

  function today() { return new Date().toISOString().split('T')[0]; }
  function getStatus(f) {
    const t = today();
    if (f.endDate < t)   return 'expired';
    if (f.startDate > t) return 'upcoming';
    return 'active';
  }
  function formatDate(d) {
    if (!d) return '';
    const [y, m, day] = d.split('-');
    const mo = ['jan.','fév.','mars','avr.','mai','juin','juil.','août','sep.','oct.','nov.','déc.'];
    return `${parseInt(day)} ${mo[parseInt(m)-1]} ${y}`;
  }

  const STATUS_LABEL = { active: 'En cours', upcoming: 'À venir', expired: 'Terminé' };
  const real = FLYERS.filter(f => !f.type);

  const main = document.getElementById('mainContent');

  if (!real.length) {
    main.innerHTML = '<p class="empty-state">Aucun flyer pour le moment.</p>';
  } else {
    const header = document.createElement('div');
    header.className = 'page-header';
    header.innerHTML = `
      <h2>Tous les flyers <span>publiés</span></h2>
      <span class="flyer-count">${real.length} flyer${real.length > 1 ? 's' : ''}</span>`;
    main.appendChild(header);

    const grid = document.createElement('div');
    grid.className = 'history-grid';

    real.forEach(f => {
      const status  = getStatus(f);
      const bgStyle = f.image ? `background-image:url('${f.image}')` : 'background:#3a9a78';
      const card = document.createElement('div');
      card.className = 'h-card';
      card.innerHTML = `
        <div class="h-thumb"><div class="h-thumb-inner" style="${bgStyle}"></div></div>
        <div class="h-body">
          <div class="h-title">${f.title}</div>
          <div class="h-dates">${formatDate(f.startDate)} → ${formatDate(f.endDate)}</div>
          <span class="h-badge h-badge-${status}">${STATUS_LABEL[status]}</span>
        </div>`;
      grid.appendChild(card);
    });
    main.appendChild(grid);
  }
</script>
</body>
</html>
