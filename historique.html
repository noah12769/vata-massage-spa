<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Historique — Vata Promotions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:     #0e0c0a;
      --surface:#171411;
      --border: rgba(255,255,255,.09);
      --cream:  #f5ede0;
      --gold:   #b8976a;
      --teal:   #2d6b68;
      --danger: #c94040;
      --text:   rgba(245,237,224,.85);
      --muted:  rgba(245,237,224,.42);
    }

    html, body {
      min-height: 100dvh;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
    }

    /* ── TOPBAR ── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2.4rem;
      background: rgba(14,12,10,.9); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 50;
    }
    .topbar__left { display: flex; align-items: center; gap: 1rem; }
    .topbar__logo-text { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 1.3rem; font-weight: 300; letter-spacing: .22em; text-transform: uppercase; color: rgba(255,255,255,.55); }
    .topbar__title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.1rem; font-weight: 300; color: var(--cream);
    }
    .topbar__title small {
      display: block; font-size: .58rem; letter-spacing: .22em;
      text-transform: uppercase; color: var(--gold); margin-bottom: .1rem;
    }

    .btn-back {
      display: inline-flex; align-items: center; gap: .5rem;
      padding: .5rem 1.1rem; border-radius: 100px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); font-size: .7rem; letter-spacing: .12em;
      text-transform: uppercase; text-decoration: none;
      transition: color .2s, border-color .2s;
    }
    .btn-back:hover { color: var(--cream); border-color: rgba(255,255,255,.25); }

    /* ── LAYOUT ── */
    .main { max-width: 1100px; margin: 0 auto; padding: 2.5rem 2rem 5rem; }

    /* ── PAGE HEADER ── */
    .page-header {
      display: flex; align-items: baseline; justify-content: space-between;
      flex-wrap: wrap; gap: .6rem;
      margin-bottom: 1.8rem; padding-bottom: .9rem;
      border-bottom: 1px solid var(--border);
    }
    .page-header h2 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.4rem; font-weight: 300; color: var(--cream);
    }
    .page-header h2 span { font-style: italic; }
    .flyer-count {
      font-size: .65rem; letter-spacing: .18em; text-transform: uppercase; color: var(--muted);
    }

    /* ── GRID ── */
    .history-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
      gap: 1.1rem;
    }
    .h-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
      display: flex; flex-direction: column;
      transition: border-color .25s;
    }
    .h-card:hover { border-color: rgba(255,255,255,.18); }
    .h-card--archived { opacity: .5; }

    .h-thumb {
      width: 100%; aspect-ratio: 2/3;
      overflow: hidden; flex-shrink: 0; background: var(--bg);
    }
    .h-thumb-inner { width: 100%; height: 100%; background-size: cover; background-position: center; }

    .h-body { padding: .85rem 1rem; display: flex; flex-direction: column; gap: .28rem; flex: 1; }
    .h-title { font-size: .85rem; font-weight: 400; color: var(--cream); line-height: 1.3; }
    .h-dates { font-size: .58rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }

    .h-badge {
      display: inline-block; margin-top: .3rem;
      font-size: .5rem; letter-spacing: .16em; text-transform: uppercase;
      padding: .2rem .55rem; border-radius: 100px; font-weight: 500;
    }
    .h-badge-active   { background: rgba(45,107,104,.75); color: #fff; }
    .h-badge-upcoming { background: rgba(184,151,106,.75); color: #fff; }
    .h-badge-expired  { background: rgba(50,50,50,.85); color: rgba(255,255,255,.45); }
    .h-badge-in-carousel { background: rgba(255,255,255,.08); color: rgba(255,255,255,.5); border: 1px solid var(--border); margin-left: .3rem; }

    .h-actions { display: flex; gap: .45rem; padding: 0 1rem .85rem; }
    .h-btn {
      flex: 1; padding: .4rem; border-radius: 6px; border: none;
      font-size: .62rem; letter-spacing: .1em; text-transform: uppercase;
      cursor: pointer; transition: background .2s, color .2s;
    }
    .h-btn-restore { background: rgba(45,107,104,.2); color: var(--teal); }
    .h-btn-restore:hover { background: rgba(45,107,104,.35); }
    .h-btn-archive { background: rgba(255,255,255,.06); color: var(--muted); }
    .h-btn-archive:hover  { background: rgba(255,255,255,.12); }
    .h-btn-delete  { background: rgba(201,64,64,.14); color: #e07070; }
    .h-btn-delete:hover  { background: rgba(201,64,64,.26); }

    .empty-state {
      padding: 4rem; text-align: center;
      color: var(--muted); font-size: .88rem; font-style: italic;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--teal); color: #fff;
      font-size: .76rem; letter-spacing: .1em; padding: .75rem 1.6rem;
      border-radius: 100px; white-space: nowrap;
      transition: transform .4s cubic-bezier(.22,1,.36,1), opacity .4s;
      opacity: 0; z-index: 200;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.error { background: var(--danger); }

    @media (max-width: 640px) {
      .topbar { padding: .8rem 1.2rem; }
      .main   { padding: 1.5rem 1rem 4rem; }
      .history-grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); }
    }
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar__left">
    <span class="topbar__logo-text">LOGO</span>
    <div class="topbar__title">
      <small>Admin</small>
      Historique complet
    </div>
  </div>
  <a href="dashboard.html" class="btn-back">← Tableau de bord</a>
</header>

<main class="main" id="mainContent"></main>

<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY  = 'vata_promo_flyers';
  const MAX_CAROUSEL = 5;

  const CARD_COLORS = [
    '#3d1a10','#0f1e2d','#3d2b0a','#0d2d2b','#1e0d30','#222210',
  ];

  function getFlyers() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }
  function saveFlyers(arr) { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }

  function today() { return new Date().toISOString().split('T')[0]; }
  function getStatus(f) {
    const t = today();
    if (f.endDate < t)   return 'expired';
    if (f.startDate > t) return 'upcoming';
    return 'active';
  }
  function formatDate(d) {
    if (!d) return '';
    const [y, m, day] = d.split('-');
    const mo = ['jan.','fév.','mars','avr.','mai','juin','juil.','août','sep.','oct.','nov.','déc.'];
    return `${parseInt(day)} ${mo[parseInt(m)-1]} ${y}`;
  }
  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show' + (isError ? ' error' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = 'toast'; }, 3200);
  }

  const STATUS_LABEL = { active: 'En cours', upcoming: 'À venir', expired: 'Terminé' };

  /* ── Render ── */
  function render() {
    const all  = getFlyers().slice().sort((a, b) => b.createdAt.localeCompare(a.createdAt));
    const main = document.getElementById('mainContent');
    main.innerHTML = '';

    if (!all.length) {
      main.innerHTML = '<p class="empty-state">Aucun flyer publié pour le moment.</p>';
      return;
    }

    // En-tête avec compteur
    const header = document.createElement('div');
    header.className = 'page-header';
    header.innerHTML = `
      <h2>Tous les flyers <span>publiés</span></h2>
      <span class="flyer-count">${all.length} flyer${all.length > 1 ? 's' : ''}</span>
    `;
    main.appendChild(header);

    // Grille unique
    const grid = document.createElement('div');
    grid.className = 'history-grid';

    all.forEach(f => {
      const status     = getStatus(f);
      const inCarousel = !f.archived;
      const bgStyle    = f.image
        ? `background-image:url('${f.image}')`
        : `background:${CARD_COLORS[f.gradientIndex ?? 0]}`;

      const card = document.createElement('div');
      card.className = 'h-card' + (f.archived ? ' h-card--archived' : '');
      card.innerHTML = `
        <div class="h-thumb"><div class="h-thumb-inner" style="${bgStyle}"></div></div>
        <div class="h-body">
          <div class="h-title">${escapeHtml(f.title)}</div>
          <div class="h-dates">${formatDate(f.startDate)} → ${formatDate(f.endDate)}</div>
          <div>
            <span class="h-badge h-badge-${status}">${STATUS_LABEL[status]}</span>
            ${inCarousel ? `<span class="h-badge h-badge-in-carousel">Carrousel</span>` : ''}
          </div>
        </div>
        <div class="h-actions">
          ${inCarousel
            ? `<button class="h-btn h-btn-archive"  data-id="${f.id}" data-action="archive">Archiver</button>`
            : `<button class="h-btn h-btn-restore"  data-id="${f.id}" data-action="restore">Remettre</button>`
          }
          <button class="h-btn h-btn-delete" data-id="${f.id}" data-action="delete">Supprimer</button>
        </div>
      `;
      grid.appendChild(card);
    });

    main.appendChild(grid);

    // Délégation
    main.onclick = e => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const { id, action } = btn.dataset;
      if (action === 'delete')  doDelete(id);
      if (action === 'archive') doArchive(id);
      if (action === 'restore') doRestore(id);
    };
  }

  function doDelete(id) {
    if (!confirm('Supprimer ce flyer définitivement ?')) return;
    saveFlyers(getFlyers().filter(f => f.id !== id));
    render(); showToast('Flyer supprimé définitivement.');
  }

  function doArchive(id) {
    if (!confirm('Voulez-vous vraiment retirer ce flyer du carrousel ?')) return;
    const all = getFlyers();
    const idx = all.findIndex(f => f.id === id);
    if (idx === -1) return;
    all[idx].archived = true;
    saveFlyers(all); render();
    showToast('Flyer archivé.');
  }

  function doRestore(id) {
    const all        = getFlyers();
    const inCarousel = all.filter(f => !f.archived).length;
    if (inCarousel >= MAX_CAROUSEL) {
      showToast(`Le carrousel est plein (${MAX_CAROUSEL} max). Archivez-en un d'abord.`, true);
      return;
    }
    const idx = all.findIndex(f => f.id === id);
    if (idx === -1) return;
    all[idx].archived = false;
    saveFlyers(all); render();
    showToast('Flyer remis dans le carrousel.');
  }

  render();
</script>
</body>
</html>
