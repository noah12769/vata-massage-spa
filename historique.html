<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Historique — Vata Promotions</title>
  <link rel="icon" type="image/png" href="image/favicon.png" />
  <link rel="apple-touch-icon" href="image/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:     #3a9a78;
      --surface:#ffffff;
      --border: rgba(0,0,0,.1);
      --teal:   #1e5a40;
      --teal-h: #134530;
      --danger: #c94040;
      --text:   rgba(0,0,0,.78);
      --muted:  rgba(0,0,0,.42);
    }

    html, body {
      min-height: 100dvh;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
    }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2.4rem;
      background: #1e5a40;
      border-bottom: 1px solid rgba(255,255,255,.12);
      position: sticky; top: 0; z-index: 50;
    }
    .topbar__logo { display: flex; align-items: center; gap: 1rem; }
    .topbar__logo-img { height: 36px; width: auto; }
    .topbar__title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.1rem; font-weight: 300; color: #fff;
    }
    .topbar__title small {
      display: block; font-size: .58rem; letter-spacing: .22em;
      text-transform: uppercase; color: rgba(255,255,255,.55); margin-bottom: .12rem;
    }
    .btn-back {
      display: inline-flex; align-items: center; gap: .5rem;
      padding: .5rem 1.1rem; border-radius: 100px;
      border: none; background: rgba(255,255,255,.15);
      color: #fff; font-size: .7rem; letter-spacing: .12em;
      text-transform: uppercase; text-decoration: none;
      transition: background .2s;
    }
    .btn-back:hover { background: rgba(255,255,255,.25); }

    .main { max-width: 1100px; margin: 0 auto; padding: 2.5rem 2rem 5rem; }

    .page-header {
      display: flex; align-items: baseline; justify-content: space-between;
      flex-wrap: wrap; gap: .6rem;
      margin-bottom: 1.8rem;
    }
    .page-header h2 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.6rem; font-weight: 300; color: #fff;
    }
    .page-header h2 span { font-style: italic; }
    .flyer-count { font-size: .65rem; letter-spacing: .18em; text-transform: uppercase; color: rgba(255,255,255,.6); }

    .history-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
      gap: 1.1rem;
    }
    .h-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
      display: flex; flex-direction: column;
      transition: border-color .25s;
    }
    .h-card:hover { border-color: rgba(0,0,0,.2); }
    .h-card--archived { opacity: .55; }

    .h-thumb { width: 100%; aspect-ratio: 2/3; overflow: hidden; flex-shrink: 0; background: var(--bg); }
    .h-thumb-inner { width: 100%; height: 100%; background-size: cover; background-position: center; }

    .h-body { padding: .85rem 1rem; display: flex; flex-direction: column; gap: .28rem; flex: 1; }
    .h-title { font-size: .85rem; font-weight: 400; color: #1a1a1a; line-height: 1.3; }
    .h-dates { font-size: .58rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }

    .h-badge {
      display: inline-block; margin-top: .3rem;
      font-size: .5rem; letter-spacing: .16em; text-transform: uppercase;
      padding: .2rem .55rem; border-radius: 100px; font-weight: 500;
    }
    .h-badge-active   { background: rgba(45,107,104,.75); color: #fff; }
    .h-badge-upcoming { background: rgba(184,151,106,.75); color: #fff; }
    .h-badge-expired  { background: rgba(50,50,50,.85); color: rgba(255,255,255,.45); }
    .h-badge-carousel { background: rgba(0,0,0,.06); color: rgba(0,0,0,.5); border: 1px solid var(--border); margin-left: .3rem; }

    .h-actions { display: flex; gap: .45rem; padding: 0 1rem .85rem; }
    .h-btn {
      flex: 1; padding: .4rem; border-radius: 6px; border: none;
      font-size: .62rem; letter-spacing: .1em; text-transform: uppercase;
      cursor: pointer; transition: background .2s, color .2s;
    }
    .h-btn-restore { background: rgba(30,90,64,.15); color: var(--teal); }
    .h-btn-restore:hover { background: rgba(30,90,64,.28); }
    .h-btn-archive { background: rgba(0,0,0,.05); color: var(--muted); }
    .h-btn-archive:hover { background: rgba(0,0,0,.1); }
    .h-btn-delete  { background: rgba(201,64,64,.12); color: #c94040; }
    .h-btn-delete:hover { background: rgba(201,64,64,.24); }

    .empty-state { padding: 4rem; text-align: center; color: rgba(255,255,255,.7); font-size: .9rem; font-style: italic; }
    .loading-state { padding: 4rem; text-align: center; color: rgba(255,255,255,.6); font-size: .85rem; }

    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--teal); color: #fff;
      font-size: .76rem; letter-spacing: .1em; padding: .75rem 1.6rem;
      border-radius: 100px; white-space: nowrap;
      transition: transform .4s cubic-bezier(.22,1,.36,1), opacity .4s;
      opacity: 0; z-index: 200;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.error { background: var(--danger); }

    @media (max-width: 640px) {
      .topbar { padding: .8rem 1.2rem; }
      .main   { padding: 1.5rem 1rem 4rem; }
      .history-grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); }
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>
<body>

<header class="topbar">
  <div class="topbar__logo">
    <img src="image/logo.png" alt="Vata" class="topbar__logo-img" />
    <div class="topbar__title">
      <small>Admin</small>
      Historique complet
    </div>
  </div>
  <a href="dashboard.html" class="btn-back">← Tableau de bord</a>
</header>

<main class="main" id="mainContent">
  <p class="loading-state">Chargement…</p>
</main>

<div class="toast" id="toast"></div>

<script>
  const firebaseConfig = {
    apiKey:            'AIzaSyDsTaY0NbtMdIT4G32Xd5TmFRZYnKGX7Cs',
    authDomain:        'vata-massage-spa.firebaseapp.com',
    projectId:         'vata-massage-spa',
    storageBucket:     'vata-massage-spa.firebasestorage.app',
    messagingSenderId: '494746429610',
    appId:             '1:494746429610:web:e99dd435937403e10248d3'
  };
  firebase.initializeApp(firebaseConfig);
  const db   = firebase.firestore();
  const auth = firebase.auth();

  const MAX_CAROUSEL = 5;
  const GRADIENTS = [
    'linear-gradient(145deg,#2d6b68 0%,#1a3d3b 100%)',
    'linear-gradient(145deg,#b8976a 0%,#6b4a2a 100%)',
    'linear-gradient(145deg,#4a2d6b 0%,#2d1a40 100%)',
    'linear-gradient(145deg,#6b2d4a 0%,#3d1a2d 100%)',
    'linear-gradient(145deg,#2d4a6b 0%,#1a2d40 100%)',
    'linear-gradient(145deg,#5a6b2d 0%,#353d1a 100%)',
  ];

  async function getFlyers() {
    try {
      const snap = await db.collection('flyers').orderBy('createdAt', 'desc').get();
      return snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    } catch { return []; }
  }

  function today() { return new Date().toISOString().split('T')[0]; }
  function getStatus(f) {
    const t = today();
    if (f.endDate < t)   return 'expired';
    if (f.startDate > t) return 'upcoming';
    return 'active';
  }
  function formatDate(d) {
    if (!d) return '';
    const [y, m, day] = d.split('-');
    const mo = ['jan.','fév.','mars','avr.','mai','juin','juil.','août','sep.','oct.','nov.','déc.'];
    return `${parseInt(day)} ${mo[parseInt(m)-1]} ${y}`;
  }
  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show' + (isError ? ' error' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = 'toast'; }, 3200);
  }

  const STATUS_LABEL = { active: 'En cours', upcoming: 'À venir', expired: 'Terminé' };

  async function render() {
    const all  = await getFlyers();
    const main = document.getElementById('mainContent');
    main.innerHTML = '';

    if (!all.length) {
      main.innerHTML = '<p class="empty-state">Aucun flyer publié pour le moment.</p>';
      return;
    }

    const header = document.createElement('div');
    header.className = 'page-header';
    header.innerHTML = `
      <h2>Tous les flyers <span>publiés</span></h2>
      <span class="flyer-count">${all.length} flyer${all.length > 1 ? 's' : ''}</span>
    `;
    main.appendChild(header);

    const grid = document.createElement('div');
    grid.className = 'history-grid';

    all.forEach(f => {
      const status     = getStatus(f);
      const inCarousel = !f.archived;
      const bgStyle    = f.image
        ? `background-image:url('${f.image}')`
        : `background:${GRADIENTS[f.gradientIndex ?? 0]}`;

      const card = document.createElement('div');
      card.className = 'h-card' + (f.archived ? ' h-card--archived' : '');
      card.innerHTML = `
        <div class="h-thumb"><div class="h-thumb-inner" style="${bgStyle}"></div></div>
        <div class="h-body">
          <div class="h-title">${escapeHtml(f.title)}</div>
          <div class="h-dates">${formatDate(f.startDate)} → ${formatDate(f.endDate)}</div>
          <div>
            <span class="h-badge h-badge-${status}">${STATUS_LABEL[status]}</span>
            ${inCarousel ? `<span class="h-badge h-badge-carousel">Carrousel</span>` : ''}
          </div>
        </div>
        <div class="h-actions">
          ${inCarousel
            ? `<button class="h-btn h-btn-archive" data-id="${f.id}" data-action="archive">Archiver</button>`
            : `<button class="h-btn h-btn-restore" data-id="${f.id}" data-action="restore">Remettre</button>`
          }
          <button class="h-btn h-btn-delete" data-id="${f.id}" data-action="delete">Supprimer</button>
        </div>
      `;
      grid.appendChild(card);
    });

    main.appendChild(grid);

    main.onclick = e => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const { id, action } = btn.dataset;
      if (action === 'delete')  doDelete(id);
      if (action === 'archive') doArchive(id);
      if (action === 'restore') doRestore(id);
    };
  }

  async function doDelete(id) {
    if (!confirm('Supprimer ce flyer définitivement ?')) return;
    await db.collection('flyers').doc(id).delete();
    await render();
    showToast('Flyer supprimé définitivement.');
  }

  async function doArchive(id) {
    if (!confirm('Retirer ce flyer du carrousel ?')) return;
    await db.collection('flyers').doc(id).update({ archived: true });
    await render();
    showToast('Flyer archivé.');
  }

  async function doRestore(id) {
    const all = await getFlyers();
    if (all.filter(f => !f.archived).length >= MAX_CAROUSEL) {
      showToast(`Le carrousel est plein (${MAX_CAROUSEL} max).`, true); return;
    }
    await db.collection('flyers').doc(id).update({ archived: false });
    await render();
    showToast('Flyer remis dans le carrousel.');
  }

  // Garde auth : redirige si non connecté
  auth.onAuthStateChanged(user => {
    if (!user) { window.location.href = 'dashboard.html'; return; }
    render();
  });
</script>
</body>
</html>
